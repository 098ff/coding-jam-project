<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI Character Chat — Define a character and test their conversational boundaries.">
  <title>AI Character Chat — Test the Limits</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <!-- Emoji Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎭</text></svg>">
</head>
<body>

  <!-- Decorative Background Layer -->
  <div class="bg-layer" aria-hidden="true">
    <div class="bokeh bokeh-1"></div>
    <div class="bokeh bokeh-2"></div>
    <div class="bokeh bokeh-3"></div>
    <div class="sunray sunray-1"></div>
    <div class="sunray sunray-2"></div>
  </div>

  <main class="container">
    
    <!-- VIEW 1: CHARACTER CREATOR -->
    <section id="creator-view" class="view-panel" aria-label="Character Creator">
      <div class="app-header">
        <h1 class="app-title">🎭 Character Chat</h1>
        <p class="app-subtitle">Bring an idea to life & test its boundary constraints</p>
      </div>

      <form id="creator-form" class="glass-card" novalidate>
        <div class="form-group">
          <label for="char-name">Character Name</label>
          <input 
            type="text" 
            id="char-name" 
            placeholder="e.g., Harker the Detective, Sparky the Robot" 
            required 
            maxlength="50"
            aria-required="true"
          >
          <span class="error-msg" id="error-name" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="char-personality">Personality Description (1 paragraph)</label>
          <textarea 
            id="char-personality" 
            rows="4" 
            placeholder="e.g., Sarcastic, speaks in short sentences, constantly makes detective monologues about the weather. Loves coffee, hates mornings." 
            required 
            maxlength="500"
            aria-required="true"
          ></textarea>
          <span class="error-msg" id="error-personality" aria-live="polite"></span>
        </div>

        <div class="form-group highlight-group">
          <label for="char-forbidden">The Forbidden word/phrase (What they'd NEVER say)</label>
          <input 
            type="text" 
            id="char-forbidden" 
            placeholder="e.g., please, I love you, chocolate" 
            required 
            maxlength="50"
            aria-required="true"
          >
          <p class="field-hint">The character will actively avoid saying this, even if baited.</p>
          <span class="error-msg" id="error-forbidden" aria-live="polite"></span>
        </div>

        <button type="submit" id="btn-submit" class="btn-primary">
          <span>Bring to Life</span>
          <span class="btn-icon" aria-hidden="true">✨</span>
        </button>
      </form>
    </section>

    <!-- VIEW 2: CHAT ROOM -->
    <section id="chat-view" class="view-panel hidden" aria-label="Active Chat Room">
      <div class="chat-header glass-card">
        <div class="character-info">
          <div class="character-avatar" id="avatar-icon">?</div>
          <div>
            <h2 class="character-name" id="display-char-name">Character</h2>
            <p class="character-status" id="display-char-status">active session</p>
          </div>
        </div>
        <button id="btn-reset" class="btn-secondary" aria-label="Reset and create new character">
          <span>New Character</span>
        </button>
      </div>

      <div class="chat-box glass-card">
        <div class="chat-messages" id="chat-messages" role="log" aria-live="polite">
          <!-- Messages inserted dynamically -->
        </div>

        <div class="chat-footer">
          <div class="chat-meta">
            <span class="turn-counter" id="turn-counter">Turns: 0 / 5</span>
            <div class="typing-indicator hidden" id="typing-indicator" aria-live="polite">
              <span class="typing-dot"></span>
              <span class="typing-dot"></span>
              <span class="typing-dot"></span>
            </div>
          </div>

          <form id="chat-input-form" class="chat-input-bar">
            <input 
              type="text" 
              id="chat-message-input" 
              placeholder="Type your message..." 
              autocomplete="off"
              maxlength="500"
              aria-label="Type your message to the character"
            >
            <button type="submit" id="btn-send" class="btn-send" aria-label="Send message">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </form>

          <div class="limit-banner hidden" id="limit-banner">
            <span>You have reached the 5-turn interaction limit.</span>
            <button id="btn-reset-banner" class="btn-banner-action">Create Another Character</button>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- Error Toast -->
  <div class="toast hidden" id="error-toast" role="alert" aria-live="assertive">
    <span id="toast-text">An error occurred.</span>
    <button class="toast-close" id="btn-toast-close" aria-label="Dismiss message">✕</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
